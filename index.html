<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moshpit Stream</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-light d-flex flex-column align-items-center justify-content-center min-vh-100">

    <div class="text-center">
        <h1 class="mb-3">Moshpit Stream</h1>
        <p class="mb-4">Streaming Radio Online</p>
    </div>

    <div class="text-center">
        <img id="artwork" src="" width="300">
    </div>

    <div class="text-center">
        <p id="nowPlaying" class="mt-3">Now Playing: ...</p>
    </div>

    <div class="text-center">
        <div class="fake-player mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <button id="playBtn" class="btn btn-primary w-100 mb-2">Play</button>
            </div>
            <div class="d-flex align-items-center gap-2 mt-2">
                <i class="bi bi-volume-down-fill text-light"></i>
                <input type="range" id="volumeSlider" class="form-range flex-grow-1" min="0" max="1" step="0.01" value="1" style="accent-color: #0d6efd; height: 8px; border-radius: 5px;">
                <i class="bi bi-volume-up-fill text-light"></i>
            </div>
        </div>

        <audio id="radio"></audio>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const audio = document.getElementById('radio');
    const playBtn = document.getElementById('playBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const nowPlayingEl = document.getElementById('nowPlaying');
    const artworkEl = document.getElementById('artwork');
    
    const streamUrl = "https://proxyworker.kelvarga.com";
    
    let lastTitle = "";
    let lastArtworkTime = 0;

    async function updateNowPlaying() {
        try {
            const res = await fetch('https://nowplaying.kelvarga.com/radio/nowplaying.php', {
                cache: 'no-store'
            });

            const data = await res.json();

            nowPlayingEl.textContent = "Now Playing: " + data.title;

            // Update artwork hanya jika berubah
            if (data.artworkTime && data.artworkTime !== lastArtworkTime) {
                const img = new Image();
                img.onload = () => {
                    artworkEl.src = img.src;
                };
                // img.src = data.artwork; (original)
                img.src = data.artwork + '?v=' + data.artworkTime;
                lastArtworkTime = data.artworkTime;
            }

            lastTitle = data.title;
        } catch (e) {
            nowPlayingEl.textContent = "Now Playing: Tidak tersedia";
            artworkEl.src = "default.jpg";
        }
    }

    setInterval(updateNowPlaying, 8000);
    updateNowPlaying();

    let reconnectDelay = 3000;
    let reconnectTimer = null;
    let isPlaying = false;

    function startStream() {
        console.log('[INFO] Memulai streaming...');
        audio.src = streamUrl;
        audio.load();
        audio.play().catch(err => {
            console.error('[ERROR] play() gagal:', err);
            scheduleReconnect();
        });
    }

    function scheduleReconnect() {
        if (reconnectTimer) return;

        console.log(`[INFO] Menjadwalkan reconnect dalam ${reconnectDelay}ms`);
        reconnectTimer = setTimeout(() => {
            console.log('[INFO] Reconnect...');
            startStream();
            reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
            reconnectTimer = null;
        }, reconnectDelay);
    }

    audio.addEventListener('playing', () => {
        console.log('[INFO] Audio benar-benar playing');
        isPlaying = true;
        reconnectDelay = 3000;
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }
    });

    audio.addEventListener('waiting', () => {
        console.warn('[WARN] Buffering...');
    });

    audio.addEventListener('stalled', () => {
        console.warn('[WARN] Stream stalled');
    });

    audio.addEventListener('error', () => {
        console.error('[ERROR] Stream error');
        scheduleReconnect();
    });

    audio.addEventListener('ended', () => {
        console.warn('[WARN] Stream ended');
        scheduleReconnect();
    });

    playBtn.addEventListener('click', () => {
        console.log("[USER ACTION] Tombol Play ditekan");
        startStream();
        playBtn.disabled = true;
    });

    volumeSlider.addEventListener('input', () => {
        audio.volume = volumeSlider.value;
        console.log(`[USER ACTION] Volume diubah: ${audio.volume}`);
    });
</script>

</body>
</html>
