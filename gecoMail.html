          <!-- SUB REGION A.2  ms-5 dan overflow-auto letakkan di class Tag Main -->
          <main id="main-content" class="main-content overflow-hidden">
            <iframe
              id="gecoIframe"
              class="w-100"
              style="height: 550px"
            ></iframe>
          </main>

          class="d-none region-b row text-center justify-content-evenly align-items-center align-self-center w-100"

            class="fs-6 col-3 bg-primary text-white fw-semibold border border-primary rounded-5"
          >
            Privacy Policy
          </div>

            class="fs-6 col-3 bg-primary text-white fw-semibold border border-primary rounded-5"

          >

          </div>

      <!-- SUBMISSION OVERLAY -->
      <div
        id="submissionOverlay"
        class="d-none position-fixed top-0 start-0 w-100 h-100 justify-content-center align-items-center"
        style="z-index: 1060"
      >
        <!-- Glass background -->
        <div
          class="position-absolute top-0 start-0 w-100 h-100 bg-dark bg-opacity-25"
          style="backdrop-filter: blur(6px)"
        ></div>

        <!-- Center box -->
        <div
          class="position-relative bg-white p-4 rounded-4 shadow text-center"
          style="min-width: 280px; max-width: 400px"
        >
          <div id="spinnerOverlay"></div>
          <!-- <i id="spinnerOverlay" class="bi bi-arrow-repeat"></i> -->
          <p id="loadingTextOverlay"></p>
          <p id="submissionTextOverlay"></p>
          <p id="emailAlert"></p>
          <p id="subjectAlert"></p>
          <p id="coverLetterAlert"></p>
          <p id="submissionFeedbackAlert"></p>
          <p id="onloadCoverLetterTemplateListAlert"></p>
          <p id="onloadAttachmentTemplateListAlert"></p>

          <div class="progress" style="height: 6px">
            <div
              id="loadingBar"
              class="progress-bar progress-bar-striped progress-bar-animated"
              style="width: 0%"
            ></div>
          </div>

          <button
            id="overlayCloseButton"
            class="d-none btn btn-sm btn-primary mt-3"
            onclick="hideSubmissionOverlay()"
          >
            Tutup
          </button>
        </div>
      </div>
